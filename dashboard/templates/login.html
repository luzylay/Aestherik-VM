<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Portal de supervisión segura para el Call Center Inteligente y Análisis de Calidad de Llamadas de Aestherik-VM.">
  <title>Acceso Seguro - Aestherik-VM</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --neon-primary: #6366f1;
      --neon-glow: rgba(99, 102, 241, 0.3);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --error-color: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      overflow-x: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    /* Glow decorative background elements */
    .login-container::before {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      background: var(--neon-primary);
      filter: blur(80px);
      top: -30px;
      left: -30px;
      z-index: 0;
      opacity: 0.5;
    }

    .card {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      z-index: 1;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 15px var(--neon-glow);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--neon-primary);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 0.95rem;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--neon-primary);
      box-shadow: 0 0 8px var(--neon-glow);
    }

    .alert {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      width: 100%;
      background: var(--neon-primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      background: #4f46e5;
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .footer-note a {
      color: var(--neon-primary);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="brand-header">
        <div class="brand-logo" id="brand-tag">Aestherik-VM</div>
        <h1 id="login-title">Control de Calidad</h1>
        <p class="subtitle">Ingresa tus credenciales de supervisor</p>
      </div>

      {% if error %}
      <div class="alert" id="auth-error-alert" role="alert">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
          <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" id="login-form">
        <div class="form-group">
          <label for="username-input">Usuario de Acceso</label>
          <div class="input-wrapper">
            <input type="text" id="username-input" name="usuario" class="form-control" placeholder="admin" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password-input">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="password-input" name="clave" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submit-login-btn">Acceder al Panel</button>
      </form>
    </div>
    <div class="footer-note">
      Plataforma de Marcación Inteligente · Aestherik-VM
    </div>
  </div>
</body>
</html>
