<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Dashboard - Call Center Inteligente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Call Center Inteligente - Supervisor</span>
    <a href="/logout" class="btn btn-outline-light btn-sm">Salir</a>
  </nav>
  <div class="container my-4">
    <h5 class="mb-3">Llamadas procesadas</h5>
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Agente</th>
          <th>Origen</th>
          <th>Puntaje</th>
          <th>Texto (seguro)</th>
          <th>Audio</th>
        </tr>
      </thead>
      <tbody>
        {% for c in llamadas %}
        <tr>
          <td>{{ c.created_at }}</td>
          <td>{{ c.agent_extension }}</td>
          <td>{{ c.caller_number }}</td>
          <td><span class="badge bg-info text-dark">{{ c.puntaje }}/100</span></td>
          <td>{{ c.texto_seguro }}</td>
          <td>
            {% if c.recording_path %}
            <audio controls preload="none" style="height:32px;">
              <source src="/audio/{{ c.recording_path }}" type="audio/wav">
            </audio>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
